version: "3.9"

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
      - ./backend/chroma_db:/app/chroma_db
      - /tmp/cache:/tmp/cache
    env_file:
      - .env
    restart: always

  frontend:
    build: ./frontend
    container_name: rag-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    restart: always